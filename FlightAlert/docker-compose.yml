services:
  db:
    image: postgres:16-alpine
    container_name: flightalert_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: flightalert
      POSTGRES_USER: flightalert
      POSTGRES_PASSWORD: flightalert
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flightalert -d flightalert"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flightalert_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:
